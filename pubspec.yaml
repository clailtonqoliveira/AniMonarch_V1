name: animonarch
description: A premium, sci-fi themed anime catalog and tracking application.

publish_to: 'none' 

version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: any
  cloud_firestore: any
  firebase_crashlytics: any
  firebase_auth: any

  # State Management
  provider: ^6.1.2

  # Networking & API
  dio: ^5.5.0
  connectivity_plus: ^6.0.3

  # Local Storage & Caching
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.3
  cached_network_image: ^3.4.1

  # Navigation
  go_router: ^14.2.0

  # UI & Utilities
  google_fonts: ^6.2.1
  url_launcher: ^6.3.0
  intl: ^0.19.0
  cupertino_icons: ^1.0.8
  http: ^1.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Code Generation
  hive_generator: ^2.0.1
  build_runner: ^2.4.11
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
